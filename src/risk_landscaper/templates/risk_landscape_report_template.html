<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Landscape Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    /* Tooltip */
    .tip {
      position: relative;
      cursor: help;
      border-bottom: 1px dotted #9ca3af;
    }
    .tip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      color: #f9fafb;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.4;
      padding: 6px 10px;
      border-radius: 6px;
      white-space: normal;
      width: max-content;
      max-width: 320px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 50;
      text-transform: none;
      letter-spacing: normal;
    }
    .tip:hover::after { opacity: 1; }
    /* Info icon */
    .tip-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #6b7280;
      font-size: 10px;
      font-weight: 700;
      font-style: normal;
      line-height: 1;
      margin-left: 4px;
      flex-shrink: 0;
      cursor: help;
      vertical-align: middle;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen" x-data="reportApp()" x-cloak>

  <!-- Header -->
  <header class="bg-gray-900 text-white px-6 py-4 shadow-lg">
    <div class="max-w-screen-xl mx-auto">
      <h1 class="text-2xl font-bold tracking-tight">Risk Landscape Report</h1>
      <p class="text-gray-400 text-sm mt-0.5">
        <span x-text="data.run_slug || '?'"></span>
        &mdash; <span x-text="data.model || '?'"></span>
        &mdash; <span x-text="data.timestamp || '?'"></span>
      </p>
    </div>
  </header>

  <div class="max-w-screen-xl mx-auto p-6 space-y-6">

    <!-- Run Info -->
    <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <span class="tip" data-tip="Summary of the pipeline run that produced this risk landscape — model, policy source, and selected ontology domains.">Run Info</span>
        <span class="tip-icon tip" data-tip="Summary of the pipeline run that produced this risk landscape — model, policy source, and selected ontology domains.">i</span>
      </h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
        <div>
          <span class="tip text-gray-400" data-tip="The LLM used for risk matching and pipeline stages.">Model</span>
          <p class="font-medium text-gray-800" x-text="data.model || '?'"></p>
        </div>
        <div>
          <span class="tip text-gray-400" data-tip="Short identifier for this pipeline run.">Run Slug</span>
          <p class="font-medium text-gray-800" x-text="data.run_slug || '?'"></p>
        </div>
        <div>
          <span class="tip text-gray-400" data-tip="When this pipeline run completed.">Timestamp</span>
          <p class="font-medium text-gray-800" x-text="data.timestamp || '?'"></p>
        </div>
        <div>
          <span class="tip text-gray-400" data-tip="Ontology domains active for this run. Always-included: CCO, Commons, D3FEND, CSO, LKIF. Selectable: FIBO (finance), OBO (biomedical), IOF (manufacturing).">Selected Domains</span>
          <div class="flex flex-wrap gap-1 mt-1">
            <template x-for="d in data.selected_domains || []" :key="d">
              <span class="tip px-2 py-0.5 rounded text-xs bg-indigo-100 text-indigo-800" data-tip="Ontology domain selected for this run" x-text="d"></span>
            </template>
          </div>
        </div>
      </div>
      <template x-if="data.policy_source">
        <div class="mt-4 pt-4 border-t border-gray-200">
          <span class="tip text-gray-400 text-sm" data-tip="The content policy document that was processed. Shows organization, domain, and number of policy concepts.">Policy Source</span>
          <p class="text-sm text-gray-800 mt-1">
            <span class="font-medium" x-text="data.policy_source.organization"></span>
            &middot; <span x-text="data.policy_source.domain"></span>
            &middot; <span class="font-mono" x-text="data.policy_source.policy_count"></span> policies
          </p>
        </div>
      </template>
    </section>

    <!-- Overview Cards -->
    <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <span class="tip" data-tip="High-level counts of risks matched, frameworks covered, policy-risk mappings, and match quality concerns.">Overview</span>
        <span class="tip-icon tip" data-tip="High-level counts of risks matched, frameworks covered, policy-risk mappings, and match quality concerns.">i</span>
      </h2>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <div class="tip text-center p-4 bg-gray-50 rounded-lg" data-tip="Total unique AI safety risks matched from the knowledge graph. Each risk comes from a specific standards framework (IBM, NIST, OWASP, etc.).">
          <p class="text-3xl font-bold text-indigo-600" x-text="(data.risks || []).length"></p>
          <p class="text-xs text-gray-400 mt-1">Total Risks</p>
        </div>
        <div class="tip text-center p-4 bg-gray-50 rounded-lg" data-tip="Number of distinct risk standards frameworks represented. More frameworks = broader risk coverage across different taxonomies.">
          <p class="text-3xl font-bold text-green-600" x-text="Object.keys(data.framework_coverage || {}).length"></p>
          <p class="text-xs text-gray-400 mt-1">Frameworks</p>
        </div>
        <div class="tip text-center p-4 bg-gray-50 rounded-lg" data-tip="Number of policy concepts that have at least one risk matched to them. Should equal the number of input policy concepts.">
          <p class="text-3xl font-bold text-teal-600" x-text="(data.policy_mappings || []).length"></p>
          <p class="text-xs text-gray-400 mt-1">Policy Mappings</p>
        </div>
        <div class="tip text-center p-4 bg-gray-50 rounded-lg" data-tip="Risks matched with semantic distance > 0.4. High distance means the match may be tenuous. Zero is ideal.">
          <p class="text-3xl font-bold"
             :class="(data.weak_matches || []).length > 0 ? 'text-amber-600' : 'text-green-600'"
             x-text="(data.weak_matches || []).length"></p>
          <p class="text-xs text-gray-400 mt-1">Weak Matches</p>
        </div>
        <div class="tip text-center p-4 bg-gray-50 rounded-lg" data-tip="Policy concerns that could not be well-matched to any existing risk in the knowledge graph. May indicate taxonomy gaps.">
          <p class="text-3xl font-bold"
             :class="(data.coverage_gaps || []).length > 0 ? 'text-purple-600' : 'text-green-600'"
             x-text="(data.coverage_gaps || []).length"></p>
          <p class="text-xs text-gray-400 mt-1">Coverage Gaps</p>
        </div>
      </div>
    </section>

    <!-- Framework Coverage -->
    <section x-show="Object.keys(data.framework_coverage || {}).length" class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <span class="tip" data-tip="Distribution of risks across different risk frameworks (IBM Risk Atlas, NIST AI RMF, OWASP, etc.). Higher counts indicate broader coverage from that framework.">Framework Coverage</span>
        <span class="tip-icon tip" data-tip="Distribution of risks across different risk frameworks.">i</span>
      </h2>
      <div class="space-y-2">
        <template x-for="[fw, count] in Object.entries(data.framework_coverage || {}).sort((a, b) => b[1] - a[1])" :key="fw">
          <div class="flex items-center gap-3">
            <div class="flex-1 bg-gray-200 rounded-lg overflow-hidden">
              <div class="flex items-center justify-between px-3 py-2 rounded-lg"
                   :class="frameworkBarColor(fw)"
                   :style="`width: ${Math.max((count / Math.max(...Object.values(data.framework_coverage || {}))) * 100, 10)}%`">
                <span class="text-sm font-medium" x-text="fw"></span>
                <span class="text-sm font-mono font-semibold" x-text="count"></span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- Risk Registry -->
    <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <span class="tip" data-tip="Complete registry of all risks matched from the knowledge graph, with their descriptions, cross-mappings, and related actions.">Risk Registry</span>
        <span class="tip-icon tip" data-tip="Complete registry of all matched risks.">i</span>
      </h2>
      <div class="space-y-2">
        <template x-for="(risk, idx) in data.risks || []" :key="risk.risk_id">
          <div class="border border-gray-200 rounded-lg"
               x-data="{ expanded: false }">
            <div class="flex items-start justify-between p-3 cursor-pointer hover:bg-gray-50"
                 @click="expanded = !expanded">
              <div class="flex-1 min-w-0">
                <div class="flex flex-wrap items-baseline gap-x-2 gap-y-1 mb-1">
                  <span class="font-semibold text-gray-900" x-text="risk.risk_name"></span>
                  <span class="tip px-2 py-0.5 rounded text-xs shrink-0"
                        :class="frameworkColor(risk.risk_framework)"
                        data-tip="Source risk framework"
                        x-text="risk.risk_framework"></span>
                </div>
                <div class="font-mono text-xs text-gray-500 break-all" x-text="risk.risk_id"></div>
                <template x-if="!expanded && risk.cross_mappings?.length">
                  <div class="flex flex-wrap gap-1 mt-1">
                    <template x-for="cm in risk.cross_mappings.slice(0, 3)" :key="cm.id">
                      <span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-100 text-gray-600" x-text="cm.id"></span>
                    </template>
                    <span x-show="risk.cross_mappings.length > 3"
                          class="px-1.5 py-0.5 rounded text-[10px] bg-gray-100 text-gray-600"
                          x-text="`+${risk.cross_mappings.length - 3} more`"></span>
                  </div>
                </template>
              </div>
              <svg class="w-5 h-5 text-gray-400 transition-transform"
                   :class="expanded ? 'rotate-180' : ''"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
            <div x-show="expanded" class="px-3 pb-3 pt-0 space-y-3 border-t border-gray-100">
              <div>
                <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Full description of this risk from the source framework.">Description</p>
                <p class="text-sm text-gray-700" x-text="risk.risk_description"></p>
              </div>
              <template x-if="risk.risk_concern">
                <div>
                  <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Specific concern or impact this risk poses to AI systems.">Concern</p>
                  <p class="text-sm text-gray-700" x-text="risk.risk_concern"></p>
                </div>
              </template>
              <template x-if="risk.cross_mappings?.length">
                <div>
                  <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Ground-truth links to equivalent or related risks in other frameworks. From the knowledge graph, not LLM-generated.">Cross-Mappings</p>
                  <div class="flex flex-wrap gap-1">
                    <template x-for="cm in risk.cross_mappings" :key="cm.id">
                      <span class="tip inline-flex items-center gap-1 px-2 py-1 rounded text-xs bg-gray-100 text-gray-700" :data-tip="`Cross-mapping to another framework (${cm.mapping_type} match)`">
                        <span class="font-mono" x-text="cm.id"></span>
                        <span class="text-gray-400" x-text="`(${cm.mapping_type})`"></span>
                      </span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="risk.related_actions?.length">
                <div>
                  <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Mitigation actions or controls associated with this risk from the source framework.">Related Actions</p>
                  <ul class="text-sm text-gray-700 list-disc list-inside space-y-0.5">
                    <template x-for="action in risk.related_actions" :key="action">
                      <li x-text="action"></li>
                    </template>
                  </ul>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- Policy Mappings -->
    <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <span class="tip" data-tip="Risks matched to each policy concept, showing relevance level, match quality (distance), and justification.">Policy Mappings</span>
        <span class="tip-icon tip" data-tip="Risks matched to each policy concept with quality metrics.">i</span>
      </h2>
      <div class="space-y-3">
        <template x-for="pm in data.policy_mappings || []" :key="pm.policy_concept">
          <div class="border border-gray-200 rounded-lg"
               x-data="{ expanded: false }">
            <div class="flex items-center justify-between p-3 cursor-pointer hover:bg-gray-50"
                 @click="expanded = !expanded">
              <div class="flex items-center gap-3">
                <span class="font-semibold text-gray-900" x-text="pm.policy_concept"></span>
                <span class="px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-600"
                      x-text="`${pm.matched_risks?.length || 0} risks`"></span>
              </div>
              <svg class="w-5 h-5 text-gray-400 transition-transform"
                   :class="expanded ? 'rotate-180' : ''"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
            <div x-show="expanded" class="px-3 pb-3 pt-0 border-t border-gray-100">
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="text-left text-xs text-gray-400 uppercase border-b border-gray-200">
                      <th class="tip pb-2 pr-3" data-tip="Identifier from the source risk framework (e.g. atlas-bias-001, owasp-llm01).">Risk ID</th>
                      <th class="tip pb-2 pr-3" data-tip="Human-readable name of the matched risk.">Risk Name</th>
                      <th class="tip pb-2 pr-3" data-tip="How directly this risk relates to the policy concept. Primary = direct match, Secondary = related.">Relevance</th>
                      <th class="tip pb-2 pr-3" data-tip="Semantic search distance (0-1). Lower is better. <0.3 strong, 0.3-0.5 moderate, >0.5 weak.">Distance</th>
                      <th class="tip pb-2" data-tip="LLM-generated explanation of why this risk was matched to the policy concept.">Justification</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="mr in pm.matched_risks || []" :key="mr.risk_id">
                      <tr class="border-b border-gray-100">
                        <td class="py-2 pr-3 font-mono text-xs" x-text="mr.risk_id"></td>
                        <td class="py-2 pr-3 font-medium" x-text="mr.risk_name"></td>
                        <td class="py-2 pr-3">
                          <span class="tip px-2 py-0.5 rounded text-xs"
                                :class="{
                                  'bg-green-100 text-green-800': mr.relevance === 'primary',
                                  'bg-blue-100 text-blue-800': mr.relevance === 'secondary',
                                  'bg-gray-100 text-gray-600': mr.relevance !== 'primary' && mr.relevance !== 'secondary'
                                }"
                                data-tip="Relevance — how directly this risk relates to the policy concept"
                                x-text="mr.relevance"></span>
                        </td>
                        <td class="py-2 pr-3">
                          <span class="tip px-2 py-0.5 rounded text-xs font-mono"
                                :class="{
                                  'bg-green-100 text-green-800': mr.match_distance < 0.3,
                                  'bg-amber-100 text-amber-800': mr.match_distance >= 0.3 && mr.match_distance <= 0.5,
                                  'bg-red-100 text-red-800': mr.match_distance > 0.5
                                }"
                                data-tip="Semantic distance — lower is better. <0.3 strong, 0.3-0.5 moderate, >0.5 weak"
                                x-text="mr.match_distance?.toFixed(3) || '?'"></span>
                        </td>
                        <td class="py-2 text-gray-600" x-text="mr.justification"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- Weak Matches -->
    <section x-show="(data.weak_matches || []).length > 0" class="bg-amber-50 rounded-xl shadow-sm border border-amber-200 p-5">
      <h2 class="text-sm font-semibold text-amber-900 uppercase tracking-wide mb-3">
        <span class="tip" data-tip="Risks with semantic search distance > 0.4. High distance indicates the match may be tenuous and the risk may not genuinely apply to the policy concept.">Weak Matches</span>
        <span class="tip-icon tip" data-tip="High-distance matches that may not genuinely apply.">i</span>
      </h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-xs text-amber-900 uppercase border-b border-amber-200">
              <th class="tip pb-2 pr-3" data-tip="Risk identifier from the source framework.">Risk ID</th>
              <th class="tip pb-2 pr-3" data-tip="The policy concept this risk was matched to with high distance.">Policy Concept</th>
              <th class="tip pb-2 text-right" data-tip="Semantic search distance. Values >0.4 are considered weak matches. Higher = less confident the risk genuinely applies.">Distance</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="wm in data.weak_matches || []" :key="`${wm.risk_id}-${wm.policy_concept}`">
              <tr class="border-b border-amber-100">
                <td class="py-2 pr-3 font-mono text-xs text-amber-900" x-text="wm.risk_id"></td>
                <td class="py-2 pr-3 text-amber-900" x-text="wm.policy_concept"></td>
                <td class="py-2 text-right font-mono font-semibold text-amber-700" x-text="wm.distance?.toFixed(3) || '?'"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </section>

    <!-- Coverage Gaps -->
    <section x-show="(data.coverage_gaps || []).length > 0" class="bg-purple-50 rounded-xl shadow-sm border border-purple-200 p-5">
      <h2 class="text-sm font-semibold text-purple-900 uppercase tracking-wide mb-3">
        <span class="tip" data-tip="Policy concerns that could not be well-matched to any existing risk in the knowledge graph. These may represent taxonomy gaps — risks not yet catalogued in any framework. Gap types: domain_specialization (existing risk needs narrowing), compositional (combination of existing risks, downweighted), novel (fundamentally new failure mode).">Coverage Gaps</span>
        <span class="tip-icon tip" data-tip="Policy concerns with no good risk match — potential taxonomy gaps.">i</span>
      </h2>
      <div class="space-y-3">
        <template x-for="gap in data.coverage_gaps || []" :key="gap.policy_concept">
          <div class="border border-purple-200 rounded-lg bg-white"
               x-data="{ expanded: false }">
            <div class="flex items-start justify-between p-3 cursor-pointer hover:bg-purple-50/50"
                 @click="expanded = !expanded">
              <div class="flex-1 min-w-0">
                <div class="flex flex-wrap items-center gap-2 mb-1">
                  <span class="font-semibold text-gray-900" x-text="gap.policy_concept"></span>
                  <span class="tip px-2 py-0.5 rounded text-xs font-medium"
                        :class="{
                          'bg-blue-100 text-blue-800': gap.gap_type === 'domain_specialization',
                          'bg-gray-200 text-gray-600': gap.gap_type === 'compositional',
                          'bg-red-100 text-red-800': gap.gap_type === 'novel'
                        }"
                        :data-tip="gap.gap_type === 'domain_specialization' ? 'Existing risk needs domain narrowing' : gap.gap_type === 'compositional' ? 'Combination of existing risks (downweighted confidence)' : 'Fundamentally new failure mode'"
                        x-text="gap.gap_type.replace('_', ' ')"></span>
                  <span class="tip px-2 py-0.5 rounded text-xs font-mono"
                        :class="{
                          'bg-red-100 text-red-800': gap.confidence >= 0.8,
                          'bg-amber-100 text-amber-800': gap.confidence >= 0.5 && gap.confidence < 0.8,
                          'bg-gray-100 text-gray-600': gap.confidence < 0.5
                        }"
                        data-tip="Confidence that this is a genuine taxonomy gap (0-1). Compositional gaps are discounted by 0.6x."
                        x-text="`conf: ${gap.confidence.toFixed(3)}`"></span>
                </div>
                <p class="text-sm text-gray-600 line-clamp-1" x-text="gap.concept_definition"></p>
              </div>
              <svg class="w-5 h-5 text-gray-400 transition-transform mt-1"
                   :class="expanded ? 'rotate-180' : ''"
                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
            <div x-show="expanded" class="px-3 pb-3 pt-0 space-y-3 border-t border-purple-100">
              <div>
                <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Full definition of the policy concern that was not matched.">Definition</p>
                <p class="text-sm text-gray-700" x-text="gap.concept_definition"></p>
              </div>
              <div>
                <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Why this was classified as this gap type.">Reasoning</p>
                <p class="text-sm text-gray-700" x-text="gap.reasoning"></p>
              </div>
              <template x-if="gap.decomposition">
                <div>
                  <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Agent/activity/entity decomposition from policy enrichment — confirms the policy concern is coherent.">Decomposition</p>
                  <div class="flex flex-wrap gap-2 text-xs">
                    <template x-if="gap.decomposition.agent">
                      <span class="px-2 py-1 rounded bg-purple-100 text-purple-800">
                        <span class="font-medium">Agent:</span> <span x-text="gap.decomposition.agent"></span>
                      </span>
                    </template>
                    <template x-if="gap.decomposition.activity">
                      <span class="px-2 py-1 rounded bg-purple-100 text-purple-800">
                        <span class="font-medium">Activity:</span> <span x-text="gap.decomposition.activity"></span>
                      </span>
                    </template>
                    <template x-if="gap.decomposition.entity">
                      <span class="px-2 py-1 rounded bg-purple-100 text-purple-800">
                        <span class="font-medium">Entity:</span> <span x-text="gap.decomposition.entity"></span>
                      </span>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="gap.nearest_risks?.length">
                <div>
                  <p class="tip text-xs text-gray-400 uppercase mb-1" data-tip="Closest existing risks from the knowledge graph — all too distant for a confident match.">Nearest Risks</p>
                  <div class="space-y-1">
                    <template x-for="nr in gap.nearest_risks" :key="nr.id">
                      <div class="flex items-center justify-between text-sm">
                        <span class="font-mono text-xs text-gray-600" x-text="nr.id"></span>
                        <span class="text-xs text-gray-500" x-text="nr.name"></span>
                        <span class="tip px-2 py-0.5 rounded text-xs font-mono bg-red-100 text-red-800"
                              data-tip="Semantic distance — all nearest risks are distant, confirming the gap."
                              x-text="nr.distance?.toFixed(3) || '?'"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
